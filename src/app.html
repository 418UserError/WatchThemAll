<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WatchThemAll</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- ═══════════ DIAGNOSTIC PANEL (Ctrl+Shift+D to toggle) ══════ -->
<div id="wta-diag" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:rgba(0,0,0,0.92);color:#0f0;font:11px monospace;padding:20px;overflow-y:auto;white-space:pre-wrap"></div>
<script>
window.__diag = function(msg) {
  var el = document.getElementById('wta-diag');
  if (el) el.textContent += msg + '\n';
  console.log('[WTA]', msg);
};
window.__diag_err = function(msg, e) {
  var el = document.getElementById('wta-diag');
  if (el) el.textContent += 'ERROR: ' + msg + ' — ' + (e&&e.message||e) + '\n';
  console.error('[WTA]', msg, e);
};
document.addEventListener('DOMContentLoaded', function() {
  __diag('DOM ready');
  __diag('__wtaChrome exists: ' + (typeof window.__wtaChrome !== 'undefined'));
  __diag('window.chrome exists: ' + (typeof window.chrome !== 'undefined'));
  __diag('window.wtAPI exists: ' + (typeof window.wtAPI !== 'undefined'));
});
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'D') {
    var el = document.getElementById('wta-diag');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    e.preventDefault();
  }
});
</script>

<!-- ═══════════ BRIDGE ALIAS ══════════════════════════════════ -->
<script>
if (window.__wtaChrome) window.chrome = window.__wtaChrome;
if (window.__wtaAPI) window.wtAPI = window.__wtaAPI;
</script>

<!-- ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">▶</span>
      <span class="brand-text">WatchThemAll</span>
    </div>
    <div class="header-search-wrap">
      <svg class="search-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="header-search" id="global-search" placeholder="Search library…" autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="hdr-check-all" title="Check all tracked series for updates">↻ Check All</button>
      <button class="hdr-btn" id="hdr-export" title="Export data">⤓ Export</button>
      <button class="hdr-btn" id="hdr-import" title="Import data">⤒ Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button class="hdr-btn hdr-btn-accent" id="hdr-add" title="Add to library">+ Add</button>
    </div>
  </header>

  <!-- ── Body: Sidebar + Main ─────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-filters" id="sidebar-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="tv">📺 TV</button>
        <button class="filter-btn" data-filter="movie">🎬 Movies</button>
        <button class="filter-btn" data-filter="tracked">◎ Tracked</button>
        <button class="filter-btn" data-filter="history">◷ History</button>
      </div>
      <div class="sidebar-list" id="item-list">
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-title">Your library is empty</div>
          <div class="empty-desc">Add TV shows and movies to get started</div>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="add-btn" id="sidebar-add-btn">
          <span>+</span> Add to Library
        </button>
        <div class="providers-mini" id="providers-mini">
          <button class="providers-toggle" id="providers-toggle">
            <span>◈</span> Providers <span class="providers-count" id="providers-count">5 active</span>
          </button>
          <div class="providers-list" id="providers-list" style="display:none"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Dashboard (shown when nothing is selected) -->
      <div class="dashboard" id="dashboard-view">
        <div class="dash-grid">
          <!-- Stats card -->
          <div class="dash-card dash-stats">
            <div class="dash-card-title">Library</div>
            <div class="stat-row">
              <div class="stat-item">
                <div class="stat-value" id="stat-tv">0</div>
                <div class="stat-label">TV Series</div>
              </div>
              <div class="stat-item">
                <div class="stat-value" id="stat-movies">0</div>
                <div class="stat-label">Movies</div>
              </div>
              <div class="stat-item">
                <div class="stat-value" id="stat-tracked">0</div>
                <div class="stat-label">Tracked</div>
              </div>
            </div>
          </div>

          <!-- Upcoming card -->
          <div class="dash-card dash-upcoming">
            <div class="dash-card-title">Upcoming Episodes</div>
            <div class="upcoming-list" id="upcoming-list">
              <div class="empty-hint">No upcoming episodes</div>
            </div>
          </div>

          <!-- Recent card -->
          <div class="dash-card dash-recent">
            <div class="dash-card-title">Recently Watched</div>
            <div class="recent-list" id="recent-list">
              <div class="empty-hint">Nothing watched yet</div>
            </div>
          </div>

          <!-- Updates card -->
          <div class="dash-card dash-updates" id="dash-updates-card" style="display:none">
            <div class="dash-card-title">Updates Available</div>
            <div class="updates-list" id="updates-list"></div>
          </div>
        </div>
      </div>

      <!-- Detail view (shown when item is selected) -->
      <div class="detail-view" id="detail-view" style="display:none">
        <div class="detail-header">
          <img class="detail-thumb" id="detail-thumb" src="" alt="" onerror="this.style.display='none'">
          <div class="detail-info">
            <div class="detail-title" id="detail-title"></div>
            <div class="detail-meta" id="detail-meta"></div>
            <div class="detail-actions-row">
              <select class="detail-provider-select" id="detail-provider"></select>
              <button class="play-btn" id="detail-play-btn">▶ Play</button>
            </div>
          </div>
        </div>

        <!-- TV: Episode browser -->
        <div class="episode-browser" id="episode-browser" style="display:none">
          <div class="ep-countdown" id="ep-countdown" style="display:none">
            <div class="cd-label" id="cd-label"></div>
            <div class="cd-airdate" id="cd-airdate"></div>
            <div class="cd-timer" id="cd-timer">--</div>
          </div>
          <div class="ep-header">
            <span class="ep-show-name" id="ep-show-name"></span>
            <span class="ep-count" id="ep-count"></span>
          </div>
          <div class="ep-grid" id="ep-grid"></div>
          <div class="detail-actions">
            <button class="ghost-btn" id="detail-edit-pos">Edit Position</button>
            <button class="ghost-btn danger" id="detail-delete">Delete</button>
          </div>
        </div>

        <!-- Movie: Simple info -->
        <div class="movie-info" id="movie-info" style="display:none">
          <div class="movie-poster-wrap">
            <img class="movie-poster" id="movie-poster" src="" alt="" onerror="this.style.display='none'">
          </div>
          <div class="detail-actions">
            <button class="ghost-btn danger" id="detail-delete-movie">Delete</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Status Bar ──────────────────────────────────────────── -->
  <footer class="status-bar">
    <span class="status-left" id="status-left">Ready</span>
    <span class="status-right">
      <span id="status-providers">5 providers</span>
      <span class="status-sep">·</span>
      <span id="status-wl-check">Watchlist: --</span>
      <span class="status-sep">·</span>
      <span class="status-version">v1.0.0</span>
    </span>
  </footer>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     ADD MODAL
     ═══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="add-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add to Library</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-tabs" id="add-tabs">
      <button class="modal-tab active" data-add-mode="bookmark">📚 Bookmark</button>
      <button class="modal-tab" data-add-mode="track">◎ Track Series</button>
    </div>
    <div class="modal-body">
      <!-- Step 1: Search -->
      <div id="add-step-search">
        <input type="text" class="modal-search" id="add-search" placeholder="Search IMDB (e.g. Breaking Bad)…" autocomplete="off">
        <div class="modal-search-status" id="add-search-status"></div>
        <div class="modal-results" id="add-search-results"></div>
      </div>
      <!-- Step 2: Season/Episode (TV only) -->
      <div id="add-step-season" style="display:none">
        <div class="add-pick-hint" id="add-pick-hint"></div>
        <div class="key-row">
          <input type="number" class="modal-input half" id="add-season" placeholder="Season" min="1" value="1">
          <input type="number" class="modal-input half" id="add-episode" placeholder="Episode" min="1" value="1">
        </div>
        <div class="modal-actions">
          <button class="btn-primary" id="add-confirm-btn">Add to Library</button>
          <button class="btn-secondary" id="add-back-btn">← Back</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="add-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     EDIT POSITION MODAL (small inline editor for season/episode)
     ═══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="edit-modal" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Edit Position</span>
      <button class="modal-close" id="edit-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="edit-hint" id="edit-hint"></div>
      <div class="key-row">
        <input type="number" class="modal-input half" id="edit-season" placeholder="Season" min="1">
        <input type="number" class="modal-input half" id="edit-episode" placeholder="Episode" min="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="edit-save-btn">Save</button>
      <button class="btn-secondary" id="edit-cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════════════════════ -->
<script src="models.js"></script>
<script src="parser.js"></script>
<script src="provider-parser.js"></script>
<script src="storage.js"></script>
<script src="availability.js"></script>
<script src="watchlist.js"></script>
<script src="app-ui.js"></script>
<script src="app.js"></script>
</body>
</html>
